name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-groups
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-groups
      - run: uv run pytest

  # The tool's own release history is its integration test: every published
  # tag pair must satisfy the same severity rules the update command applies.
  semverer-self-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # audit needs full history and tags
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - run: uv run --no-sync semverer audit --tags-only

  # Runs across the support matrix on purpose: the self-baseline is hashed
  # under the pinned Python, so a cross-version structural-hash drift in a
  # new interpreter would surface here as a phantom patch finding.
  semverer-self-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - run: uv run --no-sync semverer check
