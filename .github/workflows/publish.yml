name: Publish to PyPI

on:
  push:
    branches: [main]

jobs:
  # The full local hook chain re-runs here (ruff, mypy, pytest, semverer).
  # The semverer hook fails if the version was not bumped for an API change,
  # so an unbumped merge can never reach the publish job.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-groups
      - run: uv run pre-commit run --all-files

  build:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - id: version
        run: |
          echo "version=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')" >> "$GITHUB_OUTPUT"
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      # twine upload via the official action; skip-existing makes merges
      # that did not bump the version (docs, CI tweaks) a graceful no-op.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  tag:
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Tag the published version (pre-commit consumers pin rev to tags)
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists; skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
