[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "semverer"
version = "0.1.0"
description = "Automatic semver bumps for Python packages, driven by AST-level public API change detection"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Bub Taylor", email = "bubthegreat@gmail.com" }]
requires-python = ">=3.12"
keywords = ["semver", "versioning", "ast", "pre-commit", "release-automation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Version Control",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "semver>=3.0.4",
    "tomlkit>=0.13.2",
    "typer>=0.15.1",
]

[project.urls]
Homepage = "https://github.com/bubthegreat/semverer"
Issues = "https://github.com/bubthegreat/semverer/issues"

[project.scripts]
semverer = "semverer.cli:app"

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "pre-commit>=4.6.0",
    "pytest>=8.3",
    "pytest-bdd>=8.1",
    "pytest-cov>=6.0",
    "ruff>=0.15.16",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["src"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]

[tool.semverer]
package = "src/semverer"

[tool.semverer.baseline]
version = "0.1.0"
python = "3.14"

[tool.semverer.baseline.hashes]
"semverer/__init__.py" = "sha256:e34770f649edad5ff3ea8822b2894c8d5da89aa10735ad0a5cacf0bed4aeff39"
"semverer/cli.py" = "sha256:67f88b8559705ba88aa88b1c64aaabb880d883c99c4ed5dbbd1c703238734b17"
"semverer/comparator.py" = "sha256:b3379dfcc32c9b86c64fb9a55fd41dea8993afa87eece6a9e6ccfaeca8f19b32"
"semverer/extractor.py" = "sha256:e6a5a64ea2a1d76be66b9da78e1b5d33b77bbb5277eb27a0fa3cfaa5cff29e7c"
"semverer/models.py" = "sha256:da6ffe90c177f1a91585a208b58eee38b8e53f4b20cba55f0e5ec52b59cec42a"
