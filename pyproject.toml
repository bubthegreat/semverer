"semverer/storage.py" = "sha256:98dc7d1735bd54b4686cd531b4b42d66aaff2bd518cf55939cb61a001f9118b8"
"semverer/versioning.py" = "sha256:5ba9dc6d974cd5008de8af33f9475ea56e5f9f9b1bad7143fa891bc7b66bfea2"

[tool.semverer.baseline.api]
"semverer/cli.py::ProjectContext" = "class ProjectContext"
