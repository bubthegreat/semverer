"semverer/cli.py::update" = "def update(package_path=..., pyproject=...)"
"semverer/comparator.py::classify_signature_change" = "def classify_signature_change(old, new)"
"semverer/comparator.py::compare" = "def compare(old_api, new_api, old_hashes, new_hashes, *, compare_hashes=...)"
"semverer/extractor.py::extract_module_api" = "def extract_module_api(tree)"
"semverer/extractor.py::extract_package" = "def extract_package(package_path)"
"semverer/extractor.py::function_sig" = "def function_sig(node)"
"semverer/extractor.py::hash_module" = "def hash_module(tree)"
"semverer/extractor.py::is_public" = "def is_public(name)"
