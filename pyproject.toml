"semverer/extractor.py::render_class" = "def render_class(node)"
"semverer/extractor.py::render_function" = "def render_function(node)"
"semverer/extractor.py::running_python" = "def running_python()"
"semverer/models.py::Change" = "class Change"
"semverer/models.py::Change.module" = "def module(self)"
"semverer/models.py::ClassSig" = "class ClassSig"
"semverer/models.py::FunctionSig" = "class FunctionSig"
